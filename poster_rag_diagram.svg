<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" font-family="'Segoe UI', 'Inter', 'Poppins', sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2647"/>
      <stop offset="100%" stop-color="#144272"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#205295"/>
      <stop offset="100%" stop-color="#164178"/>
    </linearGradient>
    <!-- Accent glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2C74B3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="620" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-size="34" font-weight="700" fill="#FFFFFF">Amenly — RAG Architecture</text>
  <text x="600" y="92" text-anchor="middle" font-size="17" fill="#8FB8E0">Privacy-first AI compliance: local LLM, cited answers</text>
  <rect x="530" y="106" width="140" height="4" rx="2" fill="#2C74B3" filter="url(#glow)"/>

  <!-- Pipeline row (y center ~ 230) -->
  <!-- Node coordinates -->
  <!-- 1 Question -->
  <g>
    <rect x="40" y="180" width="150" height="100" rx="14" fill="url(#card)" stroke="#2C74B3" stroke-width="1.5"/>
    <text x="115" y="222" text-anchor="middle" font-size="30">❓</text>
    <text x="115" y="256" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">User</text>
    <text x="115" y="274" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Question</text>
  </g>
  <!-- 2 Embedding -->
  <g>
    <rect x="245" y="180" width="150" height="100" rx="14" fill="url(#card)" stroke="#2C74B3" stroke-width="1.5"/>
    <text x="320" y="222" text-anchor="middle" font-size="30">🔢</text>
    <text x="320" y="256" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Embedding</text>
    <text x="320" y="274" text-anchor="middle" font-size="12" fill="#9FC4E8">nomic-embed-text</text>
  </g>
  <!-- 3 Vector Search -->
  <g>
    <rect x="450" y="180" width="150" height="100" rx="14" fill="url(#card)" stroke="#2C74B3" stroke-width="1.5"/>
    <text x="525" y="222" text-anchor="middle" font-size="30">🔍</text>
    <text x="525" y="256" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Vector Search</text>
    <text x="525" y="274" text-anchor="middle" font-size="12" fill="#9FC4E8">Qdrant DB</text>
  </g>
  <!-- 4 Context -->
  <g>
    <rect x="655" y="180" width="150" height="100" rx="14" fill="url(#card)" stroke="#2C74B3" stroke-width="1.5"/>
    <text x="730" y="222" text-anchor="middle" font-size="30">📑</text>
    <text x="730" y="256" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Context</text>
    <text x="730" y="274" text-anchor="middle" font-size="12" fill="#9FC4E8">ranked chunks</text>
  </g>
  <!-- 5 Local LLM -->
  <g>
    <rect x="860" y="180" width="150" height="100" rx="14" fill="url(#card)" stroke="#2C74B3" stroke-width="1.5" filter="url(#glow)"/>
    <text x="935" y="222" text-anchor="middle" font-size="30">🤖</text>
    <text x="935" y="256" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Local LLM</text>
    <text x="935" y="274" text-anchor="middle" font-size="12" fill="#9FC4E8">Ollama</text>
  </g>

  <!-- Arrows between pipeline nodes -->
  <g stroke="#2C74B3" stroke-width="2.5" marker-end="url(#arrow)">
    <line x1="190" y1="230" x2="243" y2="230"/>
    <line x1="395" y1="230" x2="448" y2="230"/>
    <line x1="600" y1="230" x2="653" y2="230"/>
    <line x1="805" y1="230" x2="858" y2="230"/>
  </g>

  <!-- Answer node (below LLM) -->
  <g>
    <rect x="835" y="360" width="200" height="120" rx="14" fill="#0E355F" stroke="#2C74B3" stroke-width="2" filter="url(#glow)"/>
    <text x="935" y="398" text-anchor="middle" font-size="26">✅</text>
    <text x="935" y="428" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Cited Answer</text>
    <text x="935" y="450" text-anchor="middle" font-size="12" fill="#9FC4E8">structured · sources</text>
    <text x="935" y="468" text-anchor="middle" font-size="12" fill="#9FC4E8">confidence score</text>
  </g>
  <line x1="935" y1="280" x2="935" y2="358" stroke="#2C74B3" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Knowledge base ingestion (bottom-left feeds Qdrant) -->
  <g>
    <rect x="40" y="380" width="220" height="120" rx="14" fill="#0E355F" stroke="#205295" stroke-width="1.5"/>
    <text x="150" y="416" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">📄 Framework Docs</text>
    <text x="150" y="440" text-anchor="middle" font-size="12" fill="#9FC4E8">PDF · DOCX · XLSX</text>
    <text x="150" y="462" text-anchor="middle" font-size="12" fill="#9FC4E8">chunk → embed → index</text>
    <text x="150" y="482" text-anchor="middle" font-size="11" fill="#6E9CC8">ISO · GDPR · HIPAA · NIST …</text>
  </g>
  <!-- Ingestion arrow up to Qdrant -->
  <path d="M260 420 C360 420 420 360 500 285" fill="none" stroke="#205295" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="360" y="360" font-size="12" fill="#8FB8E0" font-style="italic">ingestion</text>

  <!-- Stack footer badges -->
  <g font-size="13" font-weight="600">
    <rect x="40" y="545" width="1120" height="46" rx="10" fill="#0E355F" stroke="#205295" stroke-width="1"/>
    <text x="600" y="573" text-anchor="middle" fill="#9FC4E8">
      React · Vite · Tailwind  •  FastAPI · Python 3.13  •  PostgreSQL · Redis · Qdrant  •  Ollama · LangChain  •  Docker · Nginx
    </text>
  </g>
</svg>
